<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 페이지 편집 앱</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="badge">APP 1</p>
      <h1>PDF 페이지 편집 앱</h1>
      <p>PDF 파일을 업로드한 뒤 불필요한 페이지를 삭제하고, 페이지 순서를 바꾼 후 새 PDF로 다운로드할 수 있습니다.</p>
    </header>

    <section class="panel">
      <label class="upload-box" for="pdfFiles">
        <strong>PDF 파일 선택</strong>
        <span>하나 또는 두 개 이상의 PDF 파일을 업로드하세요.</span>
      </label>
      <input type="file" id="pdfFiles" accept="application/pdf" multiple />

      <div class="toolbar">
        <button id="downloadBtn" disabled>새 PDF 다운로드</button>
        <button id="resetBtn" type="button">초기화</button>
      </div>
    </section>

    <section class="guide">
      <h2>사용 방법</h2>
      <ol>
        <li>PDF 파일을 선택합니다.</li>
        <li>삭제할 페이지의 <b>삭제</b> 버튼을 누릅니다.</li>
        <li>페이지 카드를 드래그하여 순서를 변경합니다.</li>
        <li><b>새 PDF 다운로드</b> 버튼을 누릅니다.</li>
      </ol>
    </section>

    <section>
      <h2>페이지 목록</h2>
      <p id="status">아직 업로드된 PDF가 없습니다.</p>
      <div id="pageList" class="page-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
